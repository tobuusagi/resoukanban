name: 墨水屏综合看板推送

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 添加这一行，允许推送代码
    steps:
      - name: 获取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史，以便后续提交

      - name: 恢复天气缓存
        uses: actions/cache@v5
        with:
          path: weather_cache.json
          key: weather-cache-${{ github.run_id }}
          restore-keys: |
            weather-cache-

      - name: 安装 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install requests pillow zhdate

      - name: 运行！生成图片并推送
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          ZECTRIX_MAC: ${{ secrets.ZECTRIX_MAC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAP_WEATHER_KEY: ${{ secrets.AMAP_WEATHER_KEY }}
          HA_URL: ${{ secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
          HOME_MAC: ${{ secrets.HOME_MAC }}
          HOME_CITY_ADCODE: ${{ secrets.HOME_CITY_ADCODE }}
          HOME_WTTR_LOCATION: ${{ secrets.HOME_WTTR_LOCATION }}
          HOME_HA_TEMP_SENSOR: ${{ secrets.HOME_HA_TEMP_SENSOR }}
          HOME_HA_HUMID_SENSOR: ${{ secrets.HOME_HA_HUMID_SENSOR }}
          OFFICE_MAC: ${{ secrets.OFFICE_MAC }}
          OFFICE_CITY_ADCODE: ${{ secrets.OFFICE_CITY_ADCODE }}
          OFFICE_WTTR_LOCATION: ${{ secrets.OFFICE_WTTR_LOCATION }}
          OFFICE_HA_TEMP_SENSOR: ${{ secrets.OFFICE_HA_TEMP_SENSOR }}
          OFFICE_HA_HUMID_SENSOR: ${{ secrets.OFFICE_HA_HUMID_SENSOR }}
        run: python main.py
