name: 墨水屏综合看板推送

on:
  schedule:
  - cron: '5,25,45 6-23,0 * * *'
  - cron: '5,25 1 * * *' # 每20分钟运行一次
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 添加这一行，允许推送代码
    steps:
      - name: 获取代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史，以便后续提交

      - name: 恢复天气缓存
        uses: actions/cache@v4
        with:
          path: weather_cache.json
          key: weather-cache-${{ github.run_id }}
          restore-keys: |
            weather-cache-

      - name: 安装 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install requests pillow zhdate

      - name: 运行！生成图片并推送
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          ZECTRIX_MAC: ${{ secrets.ZECTRIX_MAC }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAP_WEATHER_KEY: ${{ secrets.AMAP_WEATHER_KEY }}   # 新增这一行
        run: python main.py
