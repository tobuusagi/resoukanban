name: Run Ink Screen Sync

on:
  workflow_dispatch:
    # 🌟 1. 开启输入参数通道
    inputs:
      mode:
        description: '运行模式 (morning/evening)'
        required: false
        default: 'auto'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run Python Script
        # 🌟 2. 核心修改：让 Python 动态接收来自外部传入的早/晚参数
        run: python mimo_page.py ${{ github.event.inputs.mode }}
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          AMAP_WEATHER_KEY: ${{ secrets.AMAP_WEATHER_KEY }}
          ZECTRIX_MAC: ${{ secrets.ZECTRIX_MAC }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
